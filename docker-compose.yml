services:

  # ── Databases ─────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: training_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Phase 1: Training Service ──────────────────────────────────────────────────

  training-service:
    build:
      context: ./services/training
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/training_db?sslmode=disable
      ENV: development
    depends_on:
      postgres:
        condition: service_healthy
  # ── Migrations (run with: make migrate-up) ────────────────────────────────────

  migrate-training:
    image: migrate/migrate:v4
    profiles: [tools]
    volumes:
      - ./services/training/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/training_db?sslmode=disable"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy

